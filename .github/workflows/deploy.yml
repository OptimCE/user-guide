name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Minify JS and CSS assets
        run: |
          npx --yes esbuild@0.24.2 \
            --minify --allow-overwrite \
            --outfile=assets/cursor.js          assets/cursor.js
          npx --yes esbuild@0.24.2 \
            --minify --allow-overwrite \
            --outfile=assets/steppy-player.js   assets/steppy-player.js
          npx --yes esbuild@0.24.2 \
            --minify --allow-overwrite \
            --outfile=assets/guides.css         assets/guides.css
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
